services:
  db:
    image: docker.io/library/postgres:16
    container_name: salon-db-dev
    environment:
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon123
      POSTGRES_DB: salon_db
    volumes:
      - salon-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: salon-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Containerfile
    container_name: salon-backend-dev
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql://salon:salon123@db:5432/salon_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Containerfile
    container_name: salon-frontend-dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  salon-db-data: